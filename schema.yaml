title: "🚀 OCI Load Balancer Deployment"

variableGroups:
  - title: "Compartment Configuration"
    variables:
      - create_compartment
      - compartment_name
      - compartment_id

  - title: "Basic Configuration"
    variables:
      - create_lb
      - lb_name
      - lb_shape

  - title: "Network Configuration"
    variables:
      - subnet_id

  - title: "Backend Configuration"
    variables:
      - backend_ips

  - title: "Existing Load Balancer"
    variables:
      - existing_lb_id

variables:

  #########################################
  # CREATE OR USE COMPARTMENT
  #########################################
  create_compartment:
    type: boolean
    title: "Create New Compartment?"
    default: false

  #########################################
  # NEW COMPARTMENT NAME (VISIBLE IF CREATE)
  #########################################
  compartment_name:
    type: string
    title: "New Compartment Name"
    visible:
      - create_compartment

  #########################################
  # EXISTING COMPARTMENT (VISIBLE IF NOT CREATE)
  #########################################
  compartment_id:
    type: enum
    title: "Select Existing Compartment"
    enum:
      - "ocid1.compartment.oc1..devxxxxx"
      - "ocid1.compartment.oc1..prodxxxxx"
    visible:
      not:
        - create_compartment

  #########################################
  # LOAD BALANCER CONFIG
  #########################################
  create_lb:
    type: boolean
    title: "Create New Load Balancer?"
    default: true

  lb_name:
    type: string
    title: "Load Balancer Name"
    required: true

  lb_shape:
    type: enum
    title: "Load Balancer Shape"
    enum:
      - flexible
      - 100Mbps
      - 400Mbps
    default: flexible

  #########################################
  # NETWORK
  #########################################
  subnet_id:
    type: string
    title: "Subnet OCID"

  #########################################
  # BACKEND IP DROPDOWN
  #########################################
  backend_ips:
    type: enum
    title: "Select Backend IP"
    required: true
    enum:
      - "10.0.1.10"
      - "10.0.1.11"
      - "10.0.1.12"

  #########################################
  # EXISTING LB
  #########################################
  existing_lb_id:
    type: string
    title: "Existing Load Balancer OCID"
    visible:
      not:
        - create_lb
