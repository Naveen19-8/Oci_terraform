schemaVersion: 1.1
version: "20190404"
locale: "en"

title: "🚀 WAF Deployment"

variableGroups:
  - title: "Compartment"
    variables:
      - create_compartment
      - compartment_name
      - compartment_id

variables:

  create_compartment:
    type: boolean
    title: "Create New Compartment?"
    default: false

  compartment_name:
    type: string
    title: "New Compartment Name"
    visible:
      eq:
        create_compartment: true

  compartment_id:
    type: enum
    title: "Select Existing Compartment"
    enum:
      - "ocid1.compartment.oc1..devxxxxx"
      - "ocid1.compartment.oc1..prodxxxxx"
    visible:
      eq:
        create_compartment: false
