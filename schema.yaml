title: "🚀 OCI Full Deployment"

variableGroups:
  - title: "Compartment"
    variables:
      - create_compartment
      - compartment_name
      - compartment_id

  - title: "Network"
    variables:
      - create_network
      - vcn_cidr
      - subnet_cidr
      - vcn_id
      - subnet_id

  - title: "Compute"
    variables:
      - create_instance
      - instance_name
      - instance_count
      - existing_instance_ips

  - title: "Load Balancer"
    variables:
      - create_lb
      - lb_name
      - lb_shape

variables:

  create_compartment:
    type: boolean
    default: false

  compartment_name:
    type: string
    visible:
      - create_compartment

  compartment_id:
    type: string
    visible:
      not:
        - create_compartment

  create_network:
    type: boolean
    default: true

  vcn_cidr:
    type: string
    default: "10.0.0.0/16"
    visible:
      - create_network

  subnet_cidr:
    type: string
    default: "10.0.1.0/24"
    visible:
      - create_network

  vcn_id:
    type: string
    visible:
      not:
        - create_network

  subnet_id:
    type: string
    visible:
      not:
        - create_network

  create_instance:
    type: boolean
    default: true

  instance_name:
    type: string
    visible:
      - create_instance

  instance_count:
    type: number
    default: 2
    visible:
      - create_instance

  existing_instance_ips:
    type: string
    visible:
      not:
        - create_instance

  create_lb:
    type: boolean
    default: true

  lb_name:
    type: string

  lb_shape:
    type: enum
    enum:
      - flexible
      - 100Mbps
      - 400Mbps
