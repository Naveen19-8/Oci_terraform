title: "🚀 OCI Smart Deployment"

#########################################
# COMPARTMENT
#########################################
create_compartment:
  type: boolean
  title: "Create New Compartment?"
  default: false

compartment_name:
  type: string
  title: "New Compartment Name"
  visible:
    eq:
      create_compartment: true

compartment_id:
  type: enum
  title: "Select Existing Compartment"
  enum:
    - "ocid1.compartment.oc1..devxxxxx"
    - "ocid1.compartment.oc1..prodxxxxx"
  visible:
    eq:
      create_compartment: false

  - title: "Network"
    variables:
      - create_network
      - vcn_id
      - subnet_id

  - title: "Instance"
    variables:
      - create_instance
      - instance_name
      - instance_count
      - existing_instance_ips

  - title: "Load Balancer"
    variables:
      - create_lb
      - lb_name
      - lb_shape

variables:

  #########################################
  # COMPARTMENT
  #########################################
  create_compartment:
    type: boolean
    title: "Create New Compartment?"
    default: false

  compartment_name:
    type: string
    title: "New Compartment Name"
    visible:
      - create_compartment

  compartment_id:
    type: enum
    title: "Select Existing Compartment"
    enum:
      - "ocid1.compartment.oc1..devxxxxx"
      - "ocid1.compartment.oc1..prodxxxxx"
    visible:
      not:
        - create_compartment

  #########################################
  # NETWORK
  #########################################
  create_network:
    type: boolean
    title: "Create Network?"
    default: true

  vcn_id:
    type: enum
    title: "Select Existing VCN"
    enum:
      - "ocid1.vcn.oc1..xxxx1"
      - "ocid1.vcn.oc1..xxxx2"
    visible:
      not:
        - create_network

  subnet_id:
    type: enum
    title: "Select Existing Subnet"
    enum:
      - "ocid1.subnet.oc1..xxxx1"
      - "ocid1.subnet.oc1..xxxx2"
    visible:
      not:
        - create_network

  #########################################
  # INSTANCE
  #########################################
  create_instance:
    type: boolean
    title: "Create Instance?"
    default: true

  instance_name:
    type: string
    visible:
      - create_instance

  instance_count:
    type: number
    default: 2
    visible:
      - create_instance

  existing_instance_ips:
    type: string
    title: "Existing Instance IPs (comma separated)"
    visible:
      not:
        - create_instance

  #########################################
  # LOAD BALANCER
  #########################################
  create_lb:
    type: boolean
    title: "Create Load Balancer?"
    default: true

  lb_name:
    type: string

  lb_shape:
    type: enum
    enum:
      - flexible
      - 100Mbps
      - 400Mbps
