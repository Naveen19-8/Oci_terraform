title: "🚀 OCI Load Balancer Deployment"

variableGroups:
  - title: "Basic Configuration"
    variables:
      - create_lb
      - lb_name
      - lb_shape

  - title: "Network Configuration"
    variables:
      - compartment_id
      - subnet_id

  - title: "Backend Configuration"
    variables:
      - backend_ips

  - title: "Existing Load Balancer"
    variables:
      - existing_lb_id

variables:

  #########################################
  # CREATE LB TOGGLE
  #########################################
  create_lb:
    type: boolean
    title: "Create New Load Balancer?"
    default: true

  #########################################
  # LB NAME
  #########################################
  lb_name:
    type: string
    title: "Load Balancer Name"
    required: true

  #########################################
  # LB SHAPE DROPDOWN
  #########################################
  lb_shape:
    type: enum
    title: "Load Balancer Shape"
    enum:
      - flexible
      - 100Mbps
      - 400Mbps
    default: flexible

  #########################################
  # 🔥 COMPARTMENT (DROPDOWN)
  #########################################
compartment_id:
  type: string
  title: "Compartment (Auto-filled)"
  #########################################
  # 🔥 SUBNET (DYNAMIC FILTER)
  #########################################


  #########################################
  # BACKEND IPS
  #########################################
backend_ips:
  type: enum
  title: "Select Backend IP"
  enum:
    - 10.0.1.10
    - 10.0.1.11
    - 10.0.1.12

  #########################################
  # EXISTING LB (CONDITIONAL)
  #########################################
  existing_lb_id:
    type: string
    title: "Existing Load Balancer OCID"
    visible:
      not:
        - create_lb



